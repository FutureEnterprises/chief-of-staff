<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    COYL favicon — SIGNAL · CAUGHT (May 24 2026).

    Half-ring C in warm chrome catches a 4-point compass star with
    3 sonar arcs radiating outward. Geometry mirrors the CoylMark
    React component (apps/web/src/components/brand/logo.tsx) exactly
    so tab favicon, nav logo, and OG previews all read as one mark.

    Inline <style> drives the star pulse + sonar ripples — browsers
    honor SVG keyframe animations on <link rel="icon" type="image/svg+xml">.
    prefers-reduced-motion respected.

    Selected May 24 2026 — replaces AZURE FACET (which the founder
    called "horrendous"). The half-ring + signal IS the product's
    mechanism rendered as a glyph.
  -->
  <style>
    @keyframes coyl-fav-star {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.62; transform: scale(0.88); }
    }
    @keyframes coyl-fav-ripple {
      0%   { opacity: 0;   transform: scale(0.7); }
      18%  { opacity: 0.7; transform: scale(0.85); }
      100% { opacity: 0;   transform: scale(1.45); }
    }
    .coyl-fav-star {
      animation: coyl-fav-star 2.4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .coyl-fav-r1, .coyl-fav-r2, .coyl-fav-r3 {
      animation: coyl-fav-ripple 2.4s ease-out infinite;
      transform-origin: 19px 16px;
      opacity: 0;
    }
    .coyl-fav-r2 { animation-delay: -0.8s; }
    .coyl-fav-r3 { animation-delay: -1.6s; }
    @media (prefers-reduced-motion: reduce) {
      .coyl-fav-star,
      .coyl-fav-r1, .coyl-fav-r2, .coyl-fav-r3 { animation: none; }
      .coyl-fav-r1 { opacity: 0.55; }
      .coyl-fav-r2 { opacity: 0.32; }
      .coyl-fav-r3 { opacity: 0.18; }
    }
  </style>
  <defs>
    <linearGradient id="fav-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="35%" stop-color="#c8c8c8"/>
      <stop offset="70%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="fav-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="22%" stop-color="#ff6600" stop-opacity="0.75"/>
      <stop offset="65%" stop-color="#ff6600" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Half-ring C, warm chrome, opens right -->
  <path d="M 17.01 9.99 A 8.5 8.5 0 1 0 17.01 22.01"
        stroke="url(#fav-chrome)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Sonar arcs radiating right -->
  <path class="coyl-fav-r1" d="M 21 12.54 A 4 4 0 0 1 21 19.46"
        stroke="#ff6600" stroke-width="0.85" stroke-linecap="round" fill="none"/>
  <path class="coyl-fav-r2" d="M 22 10.81 A 6 6 0 0 1 22 21.19"
        stroke="#ff6600" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <path class="coyl-fav-r3" d="M 23 9.07 A 8 8 0 0 1 23 22.93"
        stroke="#ff6600" stroke-width="0.75" stroke-linecap="round" fill="none"/>
  <!-- Halo behind star -->
  <circle cx="19" cy="16" r="6.5" fill="url(#fav-halo)"/>
  <!-- 4-point compass star -->
  <g class="coyl-fav-star">
    <path d="M 19 8.5 L 19.85 16 L 19 23.5 L 18.15 16 Z M 11.5 16 L 19 15.15 L 26.5 16 L 19 16.85 Z" fill="#ff6600"/>
    <path d="M 19 13 L 19.35 16 L 19 19 L 18.65 16 Z M 16 16 L 19 15.65 L 22 16 L 19 16.35 Z" fill="#ffffff"/>
  </g>
</svg>
