<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!--
    COYL favicon — mirrors the CoylMark React component.
    Bold geometric C, 270° arc opening on the right.
    See apps/web/src/components/brand/logo.tsx for the rationale.
    Kept geometrically identical so tab favicon, nav logo, and OG
    previews all read as the same mark.
  -->
  <defs>
    <linearGradient id="g" x1="4" y1="4" x2="20" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <path d="M 19.7 7.5 A 8 8 0 1 0 19.7 16.5" stroke="url(#g)" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
