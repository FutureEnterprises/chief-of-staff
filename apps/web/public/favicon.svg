<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!--
    COYL favicon — HELD PAUSE · LOZENGE.

    Hairline 270° arc + filled lozenge at center. Mirrors the
    CoylMark React component verbatim so tab favicon, nav logo, and
    OG previews read as the same mark.

    Selected from the /logo-options review on 2026-05-22.
    See apps/web/src/components/brand/logo.tsx for rationale.
  -->
  <path
    d="M 18.72 5.28 A 9.5 9.5 0 1 0 18.72 18.72"
    stroke="#ff6600"
    stroke-width="1.75"
    stroke-linecap="butt"
    fill="none"
  />
  <rect
    x="10.4"
    y="10.4"
    width="3.2"
    height="3.2"
    transform="rotate(45 12 12)"
    fill="#ff6600"
  />
</svg>
