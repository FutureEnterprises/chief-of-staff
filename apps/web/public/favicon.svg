<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!--
    COYL favicon — mirrors the CoylMark React component.
    Broken loop + catch-dot. See apps/web/src/components/brand/logo.tsx
    for the rationale. Kept geometrically identical so the tab favicon,
    nav logo, and OG previews read as the same mark.
  -->
  <defs>
    <linearGradient id="g" x1="4" y1="4" x2="20" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <path d="M 13.5 3.2 A 9 9 0 1 0 20.2 15" stroke="url(#g)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="16.9" cy="5.6" r="2.1" fill="#ff6600"/>
</svg>
