<svg width="240" height="56" viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    COYL wordmark — SIGNAL · CAUGHT (May 24 2026) · mark + COYL text.

    OG preview / social card asset. Mark sits left at 48×48px (rendered
    via nested <svg> so its 32-unit viewBox stays self-contained — this
    matters because the ripple animations use transform-origin in SVG
    user units, which would break under an outer scale transform).
    Wordmark right with orange Y.

    The star + sonar arcs animate via inline <style>; OG image
    renderers (next/og) rasterize the first frame, so social previews
    see a clean static mark. Live <img> renders animate in-browser.
  -->
  <style>
    @keyframes coyl-wm-star {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.62; transform: scale(0.88); }
    }
    @keyframes coyl-wm-ripple {
      0%   { opacity: 0;   transform: scale(0.7); }
      18%  { opacity: 0.7; transform: scale(0.85); }
      100% { opacity: 0;   transform: scale(1.45); }
    }
    .coyl-wm-star {
      animation: coyl-wm-star 2.4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    .coyl-wm-r1, .coyl-wm-r2, .coyl-wm-r3 {
      animation: coyl-wm-ripple 2.4s ease-out infinite;
      transform-origin: 19px 16px;
      opacity: 0;
    }
    .coyl-wm-r2 { animation-delay: -0.8s; }
    .coyl-wm-r3 { animation-delay: -1.6s; }
    @media (prefers-reduced-motion: reduce) {
      .coyl-wm-star,
      .coyl-wm-r1, .coyl-wm-r2, .coyl-wm-r3 { animation: none; }
      .coyl-wm-r1 { opacity: 0.55; }
      .coyl-wm-r2 { opacity: 0.32; }
      .coyl-wm-r3 { opacity: 0.18; }
    }
  </style>
  <defs>
    <linearGradient id="wm-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="35%" stop-color="#c8c8c8"/>
      <stop offset="70%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="wm-halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="22%" stop-color="#ff6600" stop-opacity="0.75"/>
      <stop offset="65%" stop-color="#ff6600" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark — nested SVG so transform-origin: 19px 16px resolves in this
       local 32-unit coordinate system, not the outer 240×56 space. -->
  <svg x="4" y="4" width="48" height="48" viewBox="0 0 32 32">
    <path d="M 17.01 9.99 A 8.5 8.5 0 1 0 17.01 22.01"
          stroke="url(#wm-chrome)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path class="coyl-wm-r1" d="M 21 12.54 A 4 4 0 0 1 21 19.46"
          stroke="#ff6600" stroke-width="0.85" stroke-linecap="round" fill="none"/>
    <path class="coyl-wm-r2" d="M 22 10.81 A 6 6 0 0 1 22 21.19"
          stroke="#ff6600" stroke-width="0.8" stroke-linecap="round" fill="none"/>
    <path class="coyl-wm-r3" d="M 23 9.07 A 8 8 0 0 1 23 22.93"
          stroke="#ff6600" stroke-width="0.75" stroke-linecap="round" fill="none"/>
    <circle cx="19" cy="16" r="6.5" fill="url(#wm-halo)"/>
    <g class="coyl-wm-star">
      <path d="M 19 8.5 L 19.85 16 L 19 23.5 L 18.15 16 Z M 11.5 16 L 19 15.15 L 26.5 16 L 19 16.85 Z" fill="#ff6600"/>
      <path d="M 19 13 L 19.35 16 L 19 19 L 18.65 16 Z M 16 16 L 19 15.65 L 22 16 L 19 16.35 Z" fill="#ffffff"/>
    </g>
  </svg>

  <!-- Wordmark — "COYL" with orange Y -->
  <text
    x="68"
    y="40"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="36"
    letter-spacing="-1.8"
    fill="#1a1a1a"
  >CO<tspan fill="#ff6600">Y</tspan>L</text>
</svg>
