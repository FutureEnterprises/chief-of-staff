<svg width="220" height="56" viewBox="0 0 220 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    COYL wordmark — SVG version for OG previews, social cards, and
    anywhere we need a flat image asset instead of the React component.

    Composition: HELD PAUSE · LOZENGE mark left, "COYL" wordmark right
    with the Y in orange. Mark sits in a 48px box aligned to the
    wordmark baseline; gap = 14px.

    Mark geometry matches apps/web/src/components/brand/logo.tsx
    exactly. Wordmark uses system-sans fallback so OG-card parsers
    (Twitter, LinkedIn, iMessage, Slack) render reliably without web
    font dependency. Production hero + nav use the React component;
    this SVG is the flat-asset backup.

    Tagline "CONTROL YOUR LIFE" removed — the brand has dropped the
    acronym lore (per the May 2026 rebrand). The wordmark stands alone.

    Selected from the /logo-options review on 2026-05-22.
  -->

  <!-- Mark — HELD PAUSE · LOZENGE, scaled 2× from the 24-unit viewBox -->
  <g transform="translate(4 4) scale(2)">
    <path
      d="M 18.72 5.28 A 9.5 9.5 0 1 0 18.72 18.72"
      stroke="#ff6600"
      stroke-width="1.75"
      stroke-linecap="butt"
      fill="none"
    />
    <rect
      x="10.4"
      y="10.4"
      width="3.2"
      height="3.2"
      transform="rotate(45 12 12)"
      fill="#ff6600"
    />
  </g>

  <!-- Wordmark — "COYL" with the Y in orange. -->
  <text
    x="66"
    y="40"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="36"
    letter-spacing="-1.8"
    fill="#1a1a1a"
  >CO<tspan fill="#ff6600">Y</tspan>L</text>
</svg>
