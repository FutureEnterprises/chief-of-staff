<svg width="240" height="56" viewBox="0 0 240 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    COYL wordmark — AZURE FACET · PULSING SIGNAL · mark + COYL text.

    OG preview / social card asset. Mark sits left at 48×48px, "COYL"
    wordmark right with orange Y. Mark geometry mirrors the React
    CoylMark component + favicon.svg exactly.

    The sparkle animates via inline <style>; OG image renderers
    (next/og) rasterize the first frame (resting), so social previews
    see a clean static mark. Live <img> renders animate in-browser.

    No tagline. The wordmark stands alone (acronym lore dropped per
    the May 2026 rebrand).
  -->
  <style>
    @keyframes coyl-wm-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.55; transform: scale(0.78); }
    }
    .coyl-wm-sparkle {
      animation: coyl-wm-pulse 2.4s ease-in-out infinite;
      transform-origin: 25px 33px;
    }
    @media (prefers-reduced-motion: reduce) {
      .coyl-wm-sparkle { animation: none; }
    }
  </style>

  <!-- Mark — scaled 2× from 24-unit viewBox -->
  <g transform="translate(4 4) scale(2)">
    <polygon points="13,2 22.5,22 1.5,22" fill="#ff6600"/>
    <polygon points="13,9 18.5,20 6.5,20" fill="#fafaf7"/>
    <path
      class="coyl-wm-sparkle"
      d="M 12.5 13.5 L 13.3 16 L 15.5 16.5 L 13.3 17 L 12.5 19.5 L 11.7 17 L 9.5 16.5 L 11.7 16 Z"
      fill="#ff6600"
    />
  </g>

  <!-- Wordmark — "COYL" with orange Y -->
  <text
    x="68"
    y="40"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="36"
    letter-spacing="-1.8"
    fill="#1a1a1a"
  >CO<tspan fill="#ff6600">Y</tspan>L</text>
</svg>
