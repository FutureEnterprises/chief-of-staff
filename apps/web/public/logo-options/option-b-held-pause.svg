<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!--
    OPTION B — HELD PAUSE.

    A hairline orange arc forming a 270° C, opening to the right, with
    a small precise dot at the geometric center. The arc is the
    bracket; the dot is the moment being held. The two elements form
    a single composition that reads as "something captured within
    boundaries."

    Construction:
      • Arc: 270° from 1:30 position to 4:30 position, long way around
      • Stroke width: 1.5 (hairline — editorial restraint vs the bold
        4px stroke of the existing mark)
      • Stroke linecap: round (the only roundness in the mark, gives
        it a hand-rendered serif quality)
      • Interior dot: radius 1.2 filled

    Why this design:
      • A hairline mark is the magazine-cover, watch-face, or fashion-
        house aesthetic. It feels more like Hermès / Aesop / Letter
        than like a tech startup. Matches the luxury editorial sweep
        of the site (Instrument Serif italic + cream + hairline rules).
      • The C-shape stays legible — readers recognize the brand-name
        first letter. The dot adds the conceptual hook (something
        captured, something held, something interior).
      • Subtler than Option A. Doesn't shout orange — invites a closer
        look. Higher-perceived-quality at the cost of weaker thumbnail.
      • Risk: hairlines can disappear at <14px favicon. Mitigation:
        ship a "favicon-only" variant where the dot becomes a fill and
        the arc becomes 2px stroke for browser-tab legibility, while
        the marketing surface uses the hairline original.

    The semantic claim: "Catch yourself before you do it again" — the
    arc is the catching; the dot is the moment being caught.
  -->
  <path
    d="M 18.72 5.28
       A 9.5 9.5 0 1 0 18.72 18.72"
    stroke="#ff6600"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
  />
  <circle cx="12" cy="12" r="1.2" fill="#ff6600"/>
</svg>
