<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COYL</title>
    <style>
      :root {
        --bg: #08090a;
        --surface: #0f1011;
        --border: #23252a;
        --text: #f7f8f8;
        --muted: #8a8f98;
        --accent: #ff6600;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px -apple-system, system-ui, sans-serif;
        min-width: 320px;
        padding: 20px;
      }
      .brand {
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 16px;
      }
      .logo {
        width: 28px; height: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #ff6600, #ff3d00);
        color: #0a0a0a;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: 16px;
      }
      .wordmark { font-weight: 800; letter-spacing: -0.02em; }
      .eyebrow {
        font-family: ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0 0 4px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .stat {
        display: flex; justify-content: space-between;
        padding: 10px 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 12px;
      }
      .stat-label { color: var(--muted); }
      .stat-value { font-weight: 700; }
      a {
        display: block;
        margin-top: 16px;
        padding: 10px 14px;
        background: linear-gradient(to right, var(--accent), #ff3d00);
        color: white;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        border-radius: 9999px;
        text-align: center;
      }
      .secondary {
        margin-top: 8px;
        background: transparent;
        color: var(--muted);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <div class="logo">C</div>
      <div class="wordmark">COYL</div>
    </div>
    <p class="eyebrow">Browser interrupt</p>
    <h1>Tab-switch awareness, on.</h1>

    <div id="stats">
      <div class="stat"><span class="stat-label">Interrupts today</span><span class="stat-value" id="today">—</span></div>
      <div class="stat"><span class="stat-label">Closed-tab rate</span><span class="stat-value" id="closed-rate">—</span></div>
      <div class="stat"><span class="stat-label">Watchlist</span><span class="stat-value" id="watchlist-count">—</span></div>
    </div>

    <a id="open-rescue" href="https://coyl.ai/rescue?from=extension" target="_blank">Open rescue now &rarr;</a>
    <a class="secondary" href="options.html" target="_blank">Settings</a>

    <script src="popup.js"></script>
  </body>
</html>
